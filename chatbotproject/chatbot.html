<!DOCTYPE html>
<html>
  <head>
    <title>chatbot</title>
    <style>
      body {
        font-family: Arial;
        margin-top: 0;
        margin-bottom: 0;
      }

      .send-button {
        background-color: rgb(25, 135, 85);
        color: white;
        padding: 11px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 9px;
        cursor: pointer;
        font-size: 15px;

      }
      .input-field {
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px ;

        flex-grow: 1;
      }

      .input-container {
        display: flex;
        margin-bottom: 20px;
      }
      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        display: flex;
        flex-direction: column;

        height: 100vh;
      }

      .user-message {
        display: flex;
        justify-content: end;
        margin-top: 10px;
        align-items: start;
      }
      .bot-message {
        display: flex;
        align-items: start;

        
      }
      .message-content {
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        max-width: 300px;
        margin-top: 20px;
        margin-bottom: 20px;
        margin-right: 10px;
        margin-left: 10px;
        max-width: 300px;
        
      }
      .chat-image {
        width: 40px;
        height: 40px;
        border-radius: 50%;
      }

      .chat-messages {
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
        
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>
        
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatInput({chatMessages, setChatMessages}) {
       const [InputText, setInputText] = React.useState('');

        function SaveMessage(event) {
          setInputText(event.target.value);
        }

        function SendMessage() {

          const newMessage = [
            ...chatMessages,
            {
              message: InputText,
              sender: "user",
              id: crypto.randomUUID()
            }
          ];
          setChatMessages(newMessage);


          const response = Chatbot.getResponse(InputText);
          console.log(response);
          setChatMessages([
            ...newMessage,
            {
              message: response,
              sender: "bot",
              id: crypto.randomUUID()
            }
          ]);
          
          

          setInputText("");

        }
        return (
          <div className="input-container">
            <input type="text" 
              placeholder="send a message" 
             size="50"
             onChange={SaveMessage}
             value={InputText}
             className="input-field" 
            />
            <button onClick={SendMessage} className="send-button">Send</button>
          </div>
        );
      }

    function ChatMessage( {message, sender} ) {

        return (
          <div className = 
          {sender === "user" 
            ? "user-message" 
            : "bot-message"
          }>
          {sender === "bot" && 
          (<img src="bot.jpg" className= "chat-image"/>)}

          <div className="message-content">
            {message}
          </div>

          {sender === "user" && 
          (<img src="profile.avif" className= "chat-image" />)}

          </div>
        )
      }
     function ChatMessages({chatMessages}) {

      const Refrence = React.useRef(null);

      React.useEffect(() => {
        const chatMessagesContainer = Refrence.current;

        if (chatMessagesContainer) {
          chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
      }
    }, [chatMessages]);
    
        return (
          <div className="chat-messages" ref={Refrence}>
            {chatMessages.map((chatmessage) => {
              return (
                <ChatMessage 
                  message={chatmessage.message} 
                  sender={chatmessage.sender}
                  key={chatmessage.id} 
                />
              );

            })}
          </div>
        );
      } 


     function App() {
      const [chatMessages, setChatMessages] = React.useState(
        [{
          message:"Hello chatbot",
          sender: "user",
          id: 1
        },
        {
          message: "hello, how can I help you?",
          sender: "bot",
          id: 2
        },
        {
          message: "can you get me todays date?",
          sender: "user",
          id: 3
        },
        {
          message: "Today's date is 17 february 2026",
          sender: "bot",
          id: 4

        }]);
      
        // const chatMessages = array[0];
        // const setChatMessages = array[1];
          return (
              <div className="app-container">
                
                <ChatMessages 
                chatMessages={chatMessages} />

                <ChatInput 
                  chatMessages={chatMessages}
                  setChatMessages={setChatMessages}
                />
              </div>

      );
     }     

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>

</html>
